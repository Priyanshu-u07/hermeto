# NOTE:
# We intentionally use pull_request_target to allow commenting on fork PRs.
# This workflow NEVER checks out or executes PR code.
# It only reads commit metadata via the GitHub API.

name: PR Readiness Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-readiness:
    name: Review Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check PR readiness
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const COMMENT_MARKER = "<!-- pr-readiness-check -->";
            const CONTRIBUTING_URL = `https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md#pull-request-guidelines`;
            const DCO_URL = "https://developercertificate.org/";

            // Fetch all commits in the PR (paginated)
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number }
            );

            const issues = [];
            const warnings = [];

            for (const c of commits) {
              const msg = c.commit.message;
              const sha = c.sha.substring(0, 7);
              const firstLine = msg.split("\n")[0].trim();

              // 1. DCO Sign-off check (proper trailer format)
              const hasDCO = /Signed-off-by:\s+.+<.+@.+>/i.test(msg);
              if (!hasDCO) {
                issues.push(
                  `❌ Commit \`${sha}\` is missing a valid \`Signed-off-by:\` trailer. ` +
                  `Use \`git commit --amend -s\` to add it. ` +
                  `See [DCO](${DCO_URL}).`
                );
              }

              // 2. Vague commit message check
              if (/^(update|fix|wip|changes?|\.)\s*$/i.test(firstLine)) {
                issues.push(
                  `❌ Commit \`${sha}\` has a vague message: "${firstLine}". ` +
                  `Please describe *what* the commit does and *why*.`
                );
              }

              // 3. Empty commit message check
              if (firstLine.length === 0) {
                issues.push(
                  `❌ Commit \`${sha}\` has an empty message. ` +
                  `Every commit must have a clear, descriptive message.`
                );
              }

              // 4. Fixup commit detection
              const fixupPattern = /^(fixup!|squash!|fix typo|oops|forgot|address review|address feedback|small fix|nit|cleanup)\b/i;
              if (fixupPattern.test(firstLine)) {
                warnings.push(
                  `⚠️ Commit \`${sha}\` ("${firstLine}") looks like a fixup. ` +
                  `Please squash it into the relevant commit before merging. ` +
                  `See [CONTRIBUTING.md](${CONTRIBUTING_URL}).`
                );
              }

              // 5. Merge commit detection
              if (firstLine.startsWith("Merge branch") || firstLine.startsWith("Merge remote")) {
                warnings.push(
                  `⚠️ Commit \`${sha}\` is a merge commit. ` +
                  `This project uses rebase — please rebase your branch instead. ` +
                  `See [CONTRIBUTING.md](${CONTRIBUTING_URL}).`
                );
              }
            }

            // Build the comment body
            const allIssues = [...issues, ...warnings];
            let body;

            if (allIssues.length > 0) {
              body = [
                COMMENT_MARKER,
                "## 🔍 PR Readiness Check",
                "",
                "The following issues were found in this pull request:",
                "",
                ...allIssues,
                "",
                "---",
                `Please address these issues to make the PR ready for review. ` +
                `Refer to the [Contributing Guidelines](${CONTRIBUTING_URL}) for details.`,
              ].join("\n");
            } else {
              body = [
                COMMENT_MARKER,
                "## ✅ PR Readiness Check",
                "",
                "All checks passed! This PR is ready for human review.",
              ].join("\n");
            }

            // Find existing bot comment to update (paginated)
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pull_number }
            );

            const existingComment = comments.find(
              (comment) => comment.body && comment.body.includes(COMMENT_MARKER)
            );

            if (existingComment) {
              // Update the existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              // Create a new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
            }

            // Fail the check if there are errors
            if (issues.length > 0) {
              core.setFailed(
                `Found ${issues.length} error(s) and ${warnings.length} warning(s). See PR comment for details.`
              );
            }
